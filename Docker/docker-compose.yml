version: "3.7"
services:
  mysqldb:
    image: mysqltrajview
    volumes:
      - trajviewdbdata:/var/lib/mysql
    container_name: db
    build: ./mysql/
    ports:
      - 3307:3306
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-unikhil",
          "-pnikhil123",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - my-network

  springboot_service:
    image: trajviewbackend
    container_name: backend
    build:
      context: /home/nikhil/Java_Workspace/trajviewBackend/
      dockerfile: Dockerfile
    volumes:
      - trajviewanalysisdata:/analysis
    ports:
      - 8080:8080
    networks:
      - my-network
    depends_on:
      mysqldb:
        condition: service_healthy
        
  frontend_service:
    image: trajviewfrontend
    container_name: frontend
    build:
      context: /home/nikhil/angularProject/trajView/
      dockerfile: Dockerfile
    ports:
      - 800:800
    networks:
      - my-network
    depends_on:
      mysqldb:
        condition: service_healthy

